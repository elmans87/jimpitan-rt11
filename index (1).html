<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimpitan RT. 11 RW. 05</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; text-align: center;}
    h2 { color: #2c3e50; margin-bottom: 5px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden;}
    .btn { background-color: #27ae60; color: white; padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; max-width: 300px; font-weight: bold; }
    .btn:hover { background-color: #219150; }
    .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    .btn-cancel { background-color: #e74c3c; }
    .btn-cancel:hover { background-color: #c0392b; }
    
    #resultArea { display: none; margin-top: 20px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin-left: auto; margin-right: auto;}
    .data-row { margin-bottom: 12px; text-align: left; }
    .data-row label { font-weight: bold; color: #7f8c8d; font-size: 14px;}
    .data-row span { display: block; padding: 10px; background: #ecf0f1; border-radius: 6px; margin-top: 5px; font-size: 16px; color: #2c3e50; font-weight: 500;}
    .nominal-text { color: #27ae60 !important; font-weight: bold !important; font-size: 18px !important;}
  </style>
</head>
<body>

  <h2>Jimpitan RT. 11 RW. 05</h2>
  <p style="color: #7f8c8d; margin-top: 0;">Mawatsari</p>
  
  <div id="scannerArea">
    <button class="btn" id="btnScan" onclick="startScanner()">📷 Scan Barcode Warga</button>
    <div id="reader" style="display:none; margin-top:20px;"></div>
  </div>

  <div id="resultArea">
    <h3 style="margin-top:0;">Konfirmasi Jimpitan</h3>
    <div class="data-row">
      <label>Tanggal Transaksi:</label>
      <span id="displayTanggal"></span>
    </div>
    <div class="data-row">
      <label>Barcode:</label>
      <span id="displayBarcode"></span>
    </div>
    <div class="data-row">
      <label>Nama Warga:</label>
      <span id="displayNama">Memuat data...</span>
    </div>
    <div class="data-row">
      <label>Nominal:</label>
      <span class="nominal-text">Rp 3.000</span>
    </div>
    
    <button class="btn" id="btnSimpan" onclick="simpanKeSheet()" disabled>💾 Simpan Jimpitan</button>
    <button class="btn btn-cancel" onclick="batal()">Batal</button>
  </div>

  <script>
    // GANTI TULISAN DI BAWAH INI DENGAN URL WEB APP GAS ANDA
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCdH6adZVNaRCqkJtXev1XLO29RApLa9cMtNKLDeEy-BNSdlV7b4oM7RzPkXX26XgiIQ/exec";

    let html5QrcodeScanner;
    let scannedBarcode = "";
    let scannedNama = "";

    function startScanner() {
      document.getElementById('btnScan').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      
      html5QrcodeScanner = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
      .catch(err => {
        alert("Gagal mengakses kamera: " + err);
        batal();
      });
    }

    function onScanSuccess(decodedText, decodedResult) {
      html5QrcodeScanner.stop().then((ignore) => {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('scannerArea').style.display = 'none';
        
        scannedBarcode = decodedText;
        tampilkanForm(scannedBarcode);
      }).catch((err) => {
        console.log("Error stopping scanner: ", err);
      });
    }

    function tampilkanForm(barcode) {
      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('displayBarcode').innerText = barcode;
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('displayTanggal').innerText = new Date().toLocaleDateString('id-ID', options);
      
      // Menembak API GAS menggunakan FETCH (Bebas CORS Preflight)
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({ action: "getNama", barcode: barcode })
      })
      .then(res => res.json())
      .then(data => {
        scannedNama = data.nama;
        document.getElementById('displayNama').innerText = data.nama;
        
        if (data.nama !== "Nama tidak ditemukan" && data.nama !== "Database tidak ditemukan") {
            document.getElementById('btnSimpan').disabled = false; 
        } else {
            document.getElementById('displayNama').style.color = "red";
            alert("Perhatian: Barcode tidak terdaftar di Database!");
        }
      })
      .catch(err => {
        alert("Gagal mengambil data dari server: " + err);
        batal();
      });
    }

    function simpanKeSheet() {
      document.getElementById('btnSimpan').innerText = "Menyimpan...";
      document.getElementById('btnSimpan').disabled = true;
      
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        redirect: "follow",
        body: JSON.stringify({ action: "simpan", barcode: scannedBarcode, nama: scannedNama })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message); // Memunculkan "Laporan Sukses!"
        resetApp();
      })
      .catch(err => {
        alert("Gagal menyimpan ke server: " + err);
        resetApp();
      });
    }

    function batal() {
      if (html5QrcodeScanner) {
        try { html5QrcodeScanner.stop(); } catch(e) {}
      }
      resetApp();
    }

    function resetApp() {
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('scannerArea').style.display = 'block';
      document.getElementById('reader').style.display = 'none';
      document.getElementById('btnScan').style.display = 'inline-block';
      
      document.getElementById('btnSimpan').innerText = "💾 Simpan Jimpitan";
      document.getElementById('btnSimpan').disabled = true;
      document.getElementById('displayNama').innerText = "Memuat data...";
      document.getElementById('displayNama').style.color = "#2c3e50";
    }
  </script>
</body>
</html>
